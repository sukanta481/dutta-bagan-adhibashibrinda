  <script>
    // Gallery lightbox functionality
    document.addEventListener('DOMContentLoaded', function() {
      const galleryItems = Array.from(document.querySelectorAll('.gallery-item'));
      const modal = document.getElementById('galleryModal');
      const modalImage = document.getElementById('galleryModalImage');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const bsModal = new bootstrap.Modal(modal);
      
      let currentIndex = 0;

      function updateModalImage(index) {
        if (galleryItems.length === 0) return;
        if (index < 0) index = galleryItems.length - 1;
        if (index >= galleryItems.length) index = 0;
        currentIndex = index;
        const item = galleryItems[currentIndex];
        modalImage.src = item.getAttribute('href');
        modalImage.alt = item.querySelector('img').alt || 'Gallery Image';
      }

      galleryItems.forEach(function(item, index) {
        item.addEventListener('click', function(e) {
          e.preventDefault();
          updateModalImage(index);
          bsModal.show();
        });
      });

      prevBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        updateModalImage(currentIndex - 1);
      });

      nextBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        updateModalImage(currentIndex + 1);
      });
      
      // Swipe support
      let touchStartX = 0;
      let touchEndX = 0;
      
      modalImage.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
      });
      
      modalImage.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      });
      
      function handleSwipe() {
        if (touchEndX < touchStartX - 50) updateModalImage(currentIndex + 1);
        if (touchEndX > touchStartX + 50) updateModalImage(currentIndex - 1);
      }

      // Close modal on click outside image
      modal.querySelector('.modal-dialog').addEventListener('click', function(e) {
        if (e.target.id !== 'galleryModalImage' && !e.target.closest('button')) {
          bsModal.hide();
        }
      });
      
      // Keyboard navigation
      document.addEventListener('keydown', function(e) {
        if (!modal.classList.contains('show')) return;
        if (e.key === 'ArrowLeft') updateModalImage(currentIndex - 1);
        if (e.key === 'ArrowRight') updateModalImage(currentIndex + 1);
      });
    });
  </script>
