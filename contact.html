<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Adhibashibrinda</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600;900&family=Fira+Sans:wght@600;700;800;900&family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<body>
  <div id="app">

    <div id="site-header"></div>

    <section class="contact-hero contact-hero-banner" role="img" aria-label="Adhibashibrinda Contact Hero"></section>

    <!-- Contact Page Content -->
    <div class="zone-2-light" style="padding-top: 40px;">
      <section class="container py-5">

        <!-- 2-Column Grid -->
        <div class="row g-5 align-items-start">

          <!-- Left Column: Info & Vibe -->
          <div class="col-12 col-lg-5">
             <p class="text-uppercase fw-bold mb-2 reveal-up" style="color: #D4AF37; font-size: 0.85rem; letter-spacing: 0.15em;">Stay Connected</p>
             <h1 class="display-4 font-serif fw-bold mb-4 reveal-up" style="color: #b22222;">Let's Celebrate Together</h1>
            <p class="mb-5" style="color: #333333; font-size: 1.1rem; line-height: 1.6;">Whether you want to sponsor, participate, or simply learn more about our Puja, we welcome you to reach out.</p>

            <!-- Contact Details -->
            <ul class="list-unstyled mb-0">
              <li class="mb-4">
                <span class="d-block text-uppercase mb-1" style="color: #b22222; font-size: 0.75rem; letter-spacing: 0.1em; font-weight: bold;">Phone</span>
                <span class="d-block mb-0" style="color: #333333; font-size: 1rem;">+91 93310 10720</span>
              </li>
              <li class="mb-4">
                <span class="d-block text-uppercase mb-1" style="color: #b22222; font-size: 0.75rem; letter-spacing: 0.1em; font-weight: bold;">Email</span>
                <a href="mailto:contact@duttabagan.com" class="d-block mb-0" style="color: #333333; font-size: 1rem; text-decoration: none;">contact@duttabagan.com</a>
              </li>
              <li class="mb-4">
                <span class="d-block text-uppercase mb-1" style="color: #b22222; font-size: 0.75rem; letter-spacing: 0.1em; font-weight: bold;">Visit Us</span>
                <span class="d-block mb-0" style="color: #333333; font-size: 1rem; line-height: 1.5;">Lakshmipur Rd, Satgachi, Baguiati, Kolkata 700028</span>
              </li>
            </ul>
          </div>

          <!-- Right Column: Minimalist Form -->
          <div class="col-12 col-lg-7">
            <form id="contactForm">
              <div class="mb-4">
                <input type="text" class="form-control contact-form-input" placeholder="Your Name" required>
              </div>
              <div class="mb-4">
                <input type="email" class="form-control contact-form-input" placeholder="Your Email" required>
              </div>
              <div class="mb-4">
                <input type="tel" class="form-control contact-form-input" placeholder="Your Phone">
              </div>
              <div class="mb-4">
                <textarea class="form-control contact-form-input" rows="4" placeholder="Your Message" required></textarea>
              </div>
              <button type="submit" class="btn w-100 py-3 text-uppercase fw-bold contact-submit-btn" style="background-color: #b22222; color: #FDFBF7; letter-spacing: 0.15em; border-radius: 0; transition: background-color 0.3s;">Send Message</button>
            </form>
          </div>

        </div>
      </section>

      <!-- Full-Width Map Anchor -->
      <div class="w-100 mt-5" style="height: 400px; filter: grayscale(20%) contrast(110%);">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3684.0!2d88.424!3d22.620!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39f8a0e3c0e3c0e3%3A0x0!2sDakshinpara+Durgotsab+Committee!5e0!3m2!1sen!2sin!4v1234567890"
          width="100%"
          height="100%"
          style="border:0;"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </div>

    <div id="site-footer"></div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
