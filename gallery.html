<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="assets/images/logo.jpeg?v=20260415-6">
  <title>Gallery - Adhibashibrinda</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600;900&family=Fira+Sans:wght@600;700;800;900&family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css?v=20260415-9">
</head>
<body>
  <script src="assets/js/loader.js?v=20260415-9"></script>

  <div id="app">

    <div id="site-header"></div>

    <div class="zone-2-light" style="padding-top: 0;">
      <div class="gallery-page-hero">
        <img src="assets/images/gallery-hero.svg" alt="Gallery hero" class="img-fluid w-100 d-block" loading="eager">
      </div>

      <section id="section-gallery" class="section-gallery">
        <div class="gallery-inner">
          <div class="gallery-header">
            <p class="gallery-eyebrow">Capturing Memories</p>
            <h2 class="gallery-title">Our Gallery</h2>
          </div>

          <!-- Year Dropdown Filter -->
          <div class="gallery-filter" id="galleryFilter">
            <select class="gallery-year-select" id="galleryYearSelect">
              <option value="">All Years</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
            </select>
          </div>

          <!-- Loading Indicator -->
          <div class="gallery-loading" id="galleryLoading">
            <div class="gallery-spinner"></div>
          </div>

          <!-- Justified Grid -->
          <div class="gallery-grid" id="galleryGrid">
            <!-- Images loaded here via JS -->
          </div>
        </div>
      </section>
    </div>

    <div id="site-footer"></div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
  <script src="assets/js/header.js?v=20260415-9"></script>
  <script src="assets/js/layout-loader.js?v=20260415-9"></script>
  <script src="assets/js/app.js?v=20260415-9"></script>
  <script src="assets/js/animations.js?v=20260415-9"></script>
  <script src="assets/js/interactions.js?v=20260415-9"></script>
  <script src="assets/js/scroll-reveal.js?v=20260415-9"></script>
  <script src="assets/js/gallery-page.js?v=20260415-9"></script>
</body>
</html>
