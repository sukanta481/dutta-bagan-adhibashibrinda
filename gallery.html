<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="assets/images/logo.jpeg?v=20260415-6">
  <title>Gallery - Adhibashibrinda</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600;900&family=Fira+Sans:wght@600;700;800;900&family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&family=Barlow+Condensed:ital,wght@1,800&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css?v=20260421-5">
</head>
<body>
  <script src="assets/js/loader.js?v=20260417-1"></script>

  <div id="app">

    <div id="site-header"></div>

    <section class="page-hero page-hero--gallery" aria-label="Gallery hero image">
      <img
        src="assets/images/Gallery-bg-1920w.webp"
        srcset="assets/images/Gallery-bg-480w.webp 480w,
                assets/images/Gallery-bg-1024w.webp 1024w,
                assets/images/Gallery-bg-1920w.webp 1920w"
        sizes="100vw"
        alt="Gallery hero"
        class="page-hero-media"
        loading="eager"
        fetchpriority="high"
        decoding="async">
      <div class="hero-video-overlay" aria-hidden="true"></div>
      <div class="hero-text-overlay">
        <div class="hero-text-content hero-text-content--gallery" data-slide="1">
          <div class="hero-text-primary" aria-label="ARTISTRY MEETS">
            <span class="hero-text-line1">ARTISTRY</span>
            <span class="hero-text-line1">MEETS</span>
          </div>
          <span class="hero-text-line2">Devotion</span>
        </div>
      </div>
    </section>

    <div class="zone-2-light page-shell" style="padding-top: 0;">

      <section id="section-gallery" class="section-gallery page-section page-section--gallery">
        <div class="page-ornament page-ornament--left page-ornament--soft" aria-hidden="true">
          <img src="assets/images/alpana.webp" alt="" loading="lazy" decoding="async">
        </div>
        <div class="gallery-inner page-section-inner">
          <div class="gallery-header anim-fadeup">
            <p class="gallery-eyebrow">Capturing Memories</p>
            <h2 class="gallery-title">Our Gallery</h2>
            <p class="gallery-page-copy">A curated visual archive of craftsmanship, celebration, and the shared energy that brings the puja alive every year.</p>
          </div>

          <!-- Year Dropdown Filter -->
          <div class="gallery-filter anim-fadeup" id="galleryFilter">
            <select class="gallery-year-select" id="galleryYearSelect">
              <option value="">All Years</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
            </select>
          </div>

          <!-- Loading Indicator -->
          <div class="gallery-loading" id="galleryLoading">
            <div class="gallery-spinner"></div>
          </div>

          <!-- Justified Grid -->
          <div class="gallery-grid" id="galleryGrid">
            <!-- Images loaded here via JS -->
          </div>
        </div>
      </section>
    </div>

    <div id="site-footer"></div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
  <script src="assets/js/header.js?v=20260417-1"></script>
  <script src="assets/js/layout-loader.js?v=20260417-1"></script>
  <script src="assets/js/app.js?v=20260417-1"></script>
  <script src="assets/js/animations.js?v=20260417-1"></script>
  <script src="assets/js/interactions.js?v=20260417-1"></script>
  <script src="assets/js/scroll-reveal.js?v=20260417-1"></script>
  <script src="assets/js/gallery-page.js?v=20260417-1"></script>
  <script>
  (function () {
    var heroText = document.querySelector('.page-hero .hero-text-content');
    if (!heroText) return;
    function activateHeroText() {
      window.requestAnimationFrame(function () {
        heroText.classList.add('active');
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', activateHeroText, { once: true });
    } else {
      activateHeroText();
    }
    window.addEventListener('pageshow', activateHeroText);
  }());
  </script>
</body>
</html>
